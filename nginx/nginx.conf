events {
    worker_connections 1024;
}

http {
    # Define an upstream block for load balancing
    upstream backend_servers {
        server backend1:3001;
        server backend2:3002;
    }

    # Define rate limiting zone
    # limit_req_zone: Key is client IP ($binary_remote_addr), zone is 'mylimit' with 10MB memory, rate is 10 requests per second.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;

        # Route API requests to backend
        location /api/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Settings for Server-Sent Events (SSE)
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        # Custom JSON response for rate limit exceeded
        error_page 429 @ratelimit;
        location @ratelimit {
            default_type application/json;
            return 429 '{"error": "Too Many Requests", "message": "System is experiencing high load. Please try again later."}';
        }
    }
}
